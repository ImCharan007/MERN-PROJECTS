<!DOCTYPE html>
<html>
<head>
  <title>Sum Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #c3e4fa;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    input {
      width: 220px;
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    h3 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Sum of Two Numbers</h2>

    <input type="number" id="num1" placeholder="Enter first number">
    <br>

    <input type="number" id="num2" placeholder="Enter second number">
    <br>

    <button onclick="calculateSum()">Add</button>

    <h3 id="result"></h3>
  </div>

  <script>
    function calculateSum() {
      let a = Number(document.getElementById("num1").value);
      let b = Number(document.getElementById("num2").value);

      let sum = a + b;

      document.getElementById("result").innerText = "Sum is: " + sum;
    }
  </script>

</body>
</html>
